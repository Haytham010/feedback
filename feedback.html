<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Feedback</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 100px;
}


.btn {
  padding: 10px 20px;
  background: green;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}


.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
}


.popup:target {
  display: block;
}


.popup-content {
  background: white;
  width: 350px;
  padding: 20px;
  margin: 120px auto;
  border-radius: 10px;
  text-align: left;
}


.close {
  display: block;
  margin-top: 15px;
  color: red;
  text-decoration: none;
}
</style>

</head>

<body>

<a href="#feedbackPopup" class="btn">Feedback</a>


<div id="feedbackPopup" class="popup">
  <div class="popup-content">
    <h3>📩 User Feedback</h3>

    <p>
      الموقع ممتاز بس محتاج تحسين في السرعة شوية 🙌  
      وكمان ياريت تضيفوا Dark Mode
    </p>

    <a href="#" class="close">Close</a>
  </div>
</div>

</body>
</html>
